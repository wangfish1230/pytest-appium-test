[pytest]
# Pytest 配置文件

# 测试文件模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 最小化输出
addopts = 
    -v
    --strict-markers
    --disable-warnings

# 标记
markers =
    android: 仅在 Android 上运行的测试
    ios: 仅在 iOS 上运行的测试
    smoke: 冒烟测试
    regression: 回归测试
    slow: 慢速测试

# 收集选项
testpaths = tests

# 超时设置
timeout = 300
